services:
  - type: web
    name: weather-locator-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: amol
      - key: ADMIN_PASSWORD
        value: amol.@
      # Set MONGODB_URI to a MongoDB Atlas free-tier URI for persistence.
      - key: MONGODB_URI
        value: ""
    healthCheckPath: /api/health
